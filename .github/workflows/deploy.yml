name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "pnpm-lock.yaml"
  workflow_dispatch: # allow manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::759650489076:role/toto-huat-github-actions-role
          aws-region: ap-southeast-1

      - name: Deploy frontend
        run: bash scripts/deploy-frontend.sh
        env:
          CLOUDFRONT_DISTRIBUTION_ID: E3Q8S087ULOJJD

  deploy-lambda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::759650489076:role/toto-huat-github-actions-role
          aws-region: ap-southeast-1

      - name: Deploy Lambda
        run: bash scripts/deploy-lambda.sh
