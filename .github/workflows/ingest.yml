name: Ingest Toto Results

on:
  schedule:
    # Mon & Thu at 13:00 UTC = 9 PM SGT
    - cron: "0 13 * * 1,4"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  id-token: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ingestion
        working-directory: apps/backend
        run: pnpm ingest:latest

      - name: Commit new data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet apps/backend/data/; then
            echo "No new data"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add apps/backend/data/toto.db
            git commit -m "data: ingest latest toto results"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.commit.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::759650489076:role/toto-huat-github-actions-role
          aws-region: ap-southeast-1

      - name: Upload toto.db to S3
        if: steps.commit.outputs.changed == 'true'
        run: aws s3 cp apps/backend/data/toto.db s3://toto-huat-data-759650489076/toto.db
